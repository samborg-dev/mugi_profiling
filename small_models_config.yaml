audio:
  datasets:
    librispeech:
      dataset: openslr/librispeech_asr
      split: [test.clean, test.other]
  models:
    - openai/whisper-tiny
    - openai/whisper-small
    - openai/whisper-base
    - openai/whisper-medium
    - openai/whisper-large
  nonlinear:
    attention: softmax
    ffn: gelu
vision_1:
  datasets:
    imagenet-1k:
      dataset: imagenet-1k
      split: validation
  models:
    - microsoft/swinv2-tiny-patch4-window8-256
    - microsoft/swinv2-small-patch4-window8-256
    - microsoft/swinv2-base-patch4-window8-256
  nonlinear:
    attention: softmax
    ffn: gelu
video:
  datasets:
    kinetics:
      dataset: nateraw/kinetics
      split: validation
  models:
    - google/vivit-b-16x2
    - google/vivit-b-16x2-kinetics400
  nonlinear:
    attention: softmax
    ffn: gelu